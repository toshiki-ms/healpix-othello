<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play Othello on a spherical HEALPix grid with NPC difficulty, best-move hints, and NEST/RING index overlays." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://toshiki-ms.github.io/healpix-game/othello.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HEALPix Games" />
    <meta property="og:title" content="HEALPix Othello - Othello on a Spherical Grid" />
    <meta property="og:description" content="A playable spherical Othello game on HEALPix pixels with NPC difficulty and best-move hints." />
    <meta property="og:url" content="https://toshiki-ms.github.io/healpix-game/othello.html" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="HEALPix Othello - Othello on a Spherical Grid" />
    <meta name="twitter:description" content="A playable spherical Othello game on HEALPix pixels with NPC difficulty and best-move hints." />
    <title>HEALPix Othello - Othello on a Spherical Grid</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="HEALPix Othello">
      <canvas id="board"></canvas>
      <div class="axis-widget" id="axisWidget" aria-hidden="true">
        <svg viewBox="0 0 160 160">
          <defs>
            <marker id="axisArrowX" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#f26f63" />
            </marker>
            <marker id="axisArrowY" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#7edc8a" />
            </marker>
            <marker id="axisArrowZ" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#76a8ff" />
            </marker>
          </defs>
          <line id="axisLineZ" class="axis-line axis-line-z" x1="78" y1="82" x2="78" y2="18" marker-end="url(#axisArrowZ)" />
          <line id="axisLineSouth" class="axis-line axis-line-south" x1="78" y1="82" x2="78" y2="140" marker-end="url(#axisArrowZ)" />
          <line id="axisLineY" class="axis-line axis-line-y" x1="78" y1="82" x2="36" y2="38" marker-end="url(#axisArrowY)" />
          <line id="axisLineX" class="axis-line axis-line-x" x1="78" y1="82" x2="136" y2="92" marker-end="url(#axisArrowX)" />
          <circle class="axis-origin" cx="78" cy="82" r="5" />
          <text id="axisTextZ" class="axis-text axis-text-z" x="102" y="27">+Z North</text>
          <text id="axisTextY" class="axis-text axis-text-y" x="34" y="31">+Y</text>
          <text id="axisTextX" class="axis-text axis-text-x" x="132" y="115">+X</text>
        </svg>
      </div>
      <section class="hud" aria-label="game status">
        <div class="title-block">
          <span class="planet-mark" aria-hidden="true"></span>
          <div>
            <h1>HEALPix Othello</h1>
            <p id="resolutionLabel">NSIDE 2 / 48 cells</p>
          </div>
          <div class="title-actions">
            <button class="panel-toggle" id="homeButton" type="button">Home</button>
            <button class="panel-toggle" id="controlsToggle" type="button" aria-expanded="true" aria-controls="controlStack">Hide settings</button>
          </div>
        </div>

        <div class="score-strip" aria-live="polite">
          <div class="score-pill score-pill-black">
            <span id="blackScoreLabel">Black</span>
            <strong id="blackScore">2</strong>
          </div>
          <div class="turn-pill" id="turnLabel">Black turn</div>
          <div class="score-pill score-pill-white">
            <span id="whiteScoreLabel">White</span>
            <strong id="whiteScore">2</strong>
          </div>
        </div>

        <div class="control-stack" id="controlStack">
          <div class="actions">
            <button id="blackNpcToggle" type="button" aria-pressed="false">Black Human</button>
            <button id="whiteNpcToggle" type="button" aria-pressed="true">White NPC</button>
            <button id="passButton" type="button" disabled>Pass</button>
            <button id="resetButton" type="button">New</button>
          </div>
          <div class="difficulty" role="group" aria-label="NPC difficulty by color">
            <div class="difficulty-row">
              <span class="difficulty-label" id="blackDifficultyLabel">Black</span>
              <button type="button" data-player="black" data-difficulty="easy" aria-pressed="true">Weak</button>
              <button type="button" data-player="black" data-difficulty="normal" aria-pressed="false">Normal</button>
              <button type="button" data-player="black" data-difficulty="hard" aria-pressed="false">Strong</button>
              <button type="button" data-player="black" data-difficulty="expert" aria-pressed="false">Expert</button>
              <button type="button" data-player="black" data-difficulty="god" aria-pressed="false">God</button>
            </div>
            <div class="difficulty-row">
              <span class="difficulty-label" id="whiteDifficultyLabel">White</span>
              <button type="button" data-player="white" data-difficulty="easy" aria-pressed="true">Weak</button>
              <button type="button" data-player="white" data-difficulty="normal" aria-pressed="false">Normal</button>
              <button type="button" data-player="white" data-difficulty="hard" aria-pressed="false">Strong</button>
              <button type="button" data-player="white" data-difficulty="expert" aria-pressed="false">Expert</button>
              <button type="button" data-player="white" data-difficulty="god" aria-pressed="false">God</button>
            </div>
          </div>
          <button class="hint-action" id="godHintButton" type="button">God move</button>
          <button class="index-action" id="indexOverlayToggle" type="button" aria-pressed="false">Index off</button>
        </div>
      </section>

      <output class="status-line" id="message" aria-live="polite">Legal moves</output>

      <section class="net-panel" aria-label="HEALPix unfolded board">
        <div class="net-head">
          <span id="netTitle">Unfolded map</span>
          <button class="panel-toggle net-toggle" id="netToggle" type="button" aria-expanded="true" aria-controls="netBoard">Hide</button>
        </div>
        <svg id="netBoard" role="img" aria-label="HEALPix unfolded board"></svg>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
