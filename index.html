<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEALPix Othello</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="HEALPix Othello">
      <canvas id="board"></canvas>
      <div class="axis-widget" id="axisWidget" aria-hidden="true">
        <svg viewBox="0 0 160 160">
          <defs>
            <marker id="axisArrowX" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#f26f63" />
            </marker>
            <marker id="axisArrowY" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#7edc8a" />
            </marker>
            <marker id="axisArrowZ" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#76a8ff" />
            </marker>
          </defs>
          <line id="axisLineZ" class="axis-line axis-line-z" x1="78" y1="82" x2="78" y2="18" marker-end="url(#axisArrowZ)" />
          <line id="axisLineSouth" class="axis-line axis-line-south" x1="78" y1="82" x2="78" y2="140" marker-end="url(#axisArrowZ)" />
          <line id="axisLineY" class="axis-line axis-line-y" x1="78" y1="82" x2="36" y2="38" marker-end="url(#axisArrowY)" />
          <line id="axisLineX" class="axis-line axis-line-x" x1="78" y1="82" x2="136" y2="92" marker-end="url(#axisArrowX)" />
          <circle class="axis-origin" cx="78" cy="82" r="5" />
          <text id="axisTextZ" class="axis-text axis-text-z" x="102" y="27">+Z 北</text>
          <text id="axisTextY" class="axis-text axis-text-y" x="34" y="31">+Y</text>
          <text id="axisTextX" class="axis-text axis-text-x" x="132" y="115">+X</text>
        </svg>
      </div>
      <section class="hud" aria-label="game status">
        <div class="title-block">
          <span class="planet-mark" aria-hidden="true"></span>
          <div>
            <h1>HEALPix Othello</h1>
            <p id="resolutionLabel">NSIDE 2 / 48 cells</p>
          </div>
        </div>

        <div class="score-strip" aria-live="polite">
          <div class="score-pill score-pill-black">
            <span>黒</span>
            <strong id="blackScore">2</strong>
          </div>
          <div class="turn-pill" id="turnLabel">黒番</div>
          <div class="score-pill score-pill-white">
            <span>白</span>
            <strong id="whiteScore">2</strong>
          </div>
        </div>

        <div class="control-stack">
          <div class="actions">
            <button id="blackNpcToggle" type="button" aria-pressed="false">黒PC</button>
            <button id="whiteNpcToggle" type="button" aria-pressed="true">白NPC</button>
            <button id="passButton" type="button" disabled>パス</button>
            <button id="resetButton" type="button">新規</button>
          </div>
          <div class="difficulty" role="group" aria-label="NPC difficulty by color">
            <div class="difficulty-row">
              <span class="difficulty-label">黒</span>
              <button type="button" data-player="black" data-difficulty="easy" aria-pressed="true">弱</button>
              <button type="button" data-player="black" data-difficulty="normal" aria-pressed="false">中</button>
              <button type="button" data-player="black" data-difficulty="hard" aria-pressed="false">強</button>
              <button type="button" data-player="black" data-difficulty="expert" aria-pressed="false">最強</button>
              <button type="button" data-player="black" data-difficulty="god" aria-pressed="false">神</button>
            </div>
            <div class="difficulty-row">
              <span class="difficulty-label">白</span>
              <button type="button" data-player="white" data-difficulty="easy" aria-pressed="true">弱</button>
              <button type="button" data-player="white" data-difficulty="normal" aria-pressed="false">中</button>
              <button type="button" data-player="white" data-difficulty="hard" aria-pressed="false">強</button>
              <button type="button" data-player="white" data-difficulty="expert" aria-pressed="false">最強</button>
              <button type="button" data-player="white" data-difficulty="god" aria-pressed="false">神</button>
            </div>
          </div>
          <button class="hint-action" id="godHintButton" type="button">神の一手</button>
        </div>
      </section>

      <output class="status-line" id="message" aria-live="polite">合法手</output>

      <section class="net-panel" aria-label="HEALPix unfolded board">
        <div class="net-head">
          <span>展開図</span>
        </div>
        <svg id="netBoard" role="img" aria-label="HEALPix unfolded board"></svg>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
